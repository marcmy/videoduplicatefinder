name: Docker (Web UI)

on:
  push:
    branches:
      - perf/native-hwaccel-from-crashfix
  workflow_dispatch:
  workflow_run:
    workflows:
      - Refresh perf branch
    types:
      - completed

concurrency:
  group: docker-web-ui
  cancel-in-progress: true

jobs:
  build-and-push:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/native-hwaccel-from-crashfix

      - name: Set Docker tag SHA
        id: vars
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push vdf-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: VDF.Web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vdf-web:latest
            ghcr.io/${{ github.repository_owner }}/vdf-web:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
