name: Build releases

on:
  workflow_dispatch:
  push:
    branches:
      - perf/native-hwaccel-from-crashfix

concurrency:
  group: build-releases
  cancel-in-progress: true
    
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Delete old release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete all existing assets from the 3.0.x release so they get replaced with fresh builds
          gh release view 3.0.x --json assets --jq '.assets[].name' | while read -r asset; do
            gh release delete-asset 3.0.x "$asset" --yes
          done

  build:
    needs: cleanup

    strategy:
      matrix:
        kind: ['linux', 'windows', 'macOS', 'macOSarm64', 'linuxarm64']
        include:
          - kind: linux
            os: ubuntu-latest
            target: linux-x64
            name: linux-x64
          - kind: windows
            os: windows-latest
            target: win-x64
            name: win-x64
          - kind: macOS
            os: windows-latest
            target: osx-x64
            name: osx-x64
          - kind: macOSarm64
            os: windows-latest
            target: osx-arm64
            name: osx-arm64
          - kind: linuxarm64
            os: ubuntu-latest
            target: linux-arm64
            name: linux-arm64
            
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    - name: Declare some variables
      id: vars
      shell: bash
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    - name: Build
      shell: bash
      run: |
          # Add nuget sources
          dotnet nuget add source https://www.myget.org/F/sixlabors/api/v3/index.json
          # Build GUI
          dotnet publish ./VDF.GUI/VDF.GUI.csproj -c Release -v q --self-contained -r "${{ matrix.target }}" -o "outputGUI"
          # Build CLI
          dotnet publish ./VDF.CLI/VDF.CLI.csproj -c Release -v q --self-contained -r "${{ matrix.target }}" -o "outputCLI"
          # Build Web
          dotnet publish ./VDF.Web/VDF.Web.csproj -c Release -v q --self-contained -r "${{ matrix.target }}" -o "outputWeb"
          # Pack files
          if [ "${{ matrix.target }}" == "win-x64" ]; then
            bundleDir="Bundle-${{ matrix.target }}"
            mkdir -p "$bundleDir"
            cp -a outputGUI/. "$bundleDir/"
            copy_unique() {
              src="$1"
              while IFS= read -r -d '' file; do
                rel="${file#$src/}"
                dest="$bundleDir/$rel"
                mkdir -p "$(dirname "$dest")"
                if [ -e "$dest" ]; then
                  if ! cmp -s "$file" "$dest"; then
                    echo "Bundle conflict: '$rel' differs between publish outputs." >&2
                    exit 1
                  fi
                else
                  cp -a "$file" "$dest"
                fi
              done < <(find "$src" -type f -print0)
            }
            copy_unique outputCLI
            copy_unique outputWeb
            for exe in VDF.GUI.exe vdf-cli.exe VDF.Web.exe; do
              if [ ! -f "$bundleDir/$exe" ]; then
                echo "Bundle is missing required executable: $exe" >&2
                exit 1
              fi
            done
            7z a -tzip "GUI-${{ matrix.target }}.zip" "./outputGUI/*"
            7z a -tzip "CLI-${{ matrix.target }}.zip" "./outputCLI/*"
            7z a -tzip "Web-${{ matrix.target }}.zip" "./outputWeb/*"
            7z a -tzip "Bundle-${{ matrix.target }}.zip" "./$bundleDir"
          elif [[ "${{ matrix.target }}" == osx-* ]]; then
            # Wrap the GUI in a proper macOS .app bundle
            mkdir -p "Video Duplicate Finder.app/Contents/MacOS"
            mkdir -p "Video Duplicate Finder.app/Contents/Resources"
            cp -r outputGUI/. "Video Duplicate Finder.app/Contents/MacOS/"
            cp "VDF.GUI/Assets/macOS/icon.icns" "Video Duplicate Finder.app/Contents/Resources/icon.icns"
            cp "VDF.GUI/Assets/macOS/Info.plist" "Video Duplicate Finder.app/Contents/Info.plist"
            tar czvf "GUI-${{ matrix.target }}.tar.gz" "Video Duplicate Finder.app"
            tar czvf "CLI-${{ matrix.target }}.tar.gz" "outputCLI"
            tar czvf "Web-${{ matrix.target }}.tar.gz" "outputWeb"
          else
            # Bundle .desktop file and icon for Linux desktop integration
            cp "VDF.GUI/Assets/Linux/icon.png" "outputGUI/icon.png"
            cp "VDF.GUI/Assets/Linux/videoduplicatefinder.desktop" "outputGUI/videoduplicatefinder.desktop"
            tar czvf "GUI-${{ matrix.target }}.tar.gz" "outputGUI"
            tar czvf "CLI-${{ matrix.target }}.tar.gz" "outputCLI"
            tar czvf "Web-${{ matrix.target }}.tar.gz" "outputWeb"
          fi
          # Clean up
          rm -rf "outputGUI" "outputCLI" "outputWeb" "Bundle-${{ matrix.target }}" "Video Duplicate Finder.app"
          
    - name: Publish
      uses: softprops/action-gh-release@v2
      with:
          tag_name: 3.0.x
          files: |
            GUI-*
            CLI-*
            Web-*
            Bundle-*
          body: |
            Note: These are daily builds. Attachments are automatically created and replaced on every new commit. Regardless of what the message above says. If you experience upgrade issues you may need to delete your 'ScannedFiles.db' file in VDF folder.
            Last build based on ${{ steps.vars.outputs.sha_short }}
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


