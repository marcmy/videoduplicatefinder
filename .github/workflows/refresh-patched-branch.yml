name: Refresh patched branch

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-patched-branch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout patched branch
        uses: actions/checkout@v5
        with:
          ref: build/native-swscale-dest-buffer-padding
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin branches
        run: |
          git fetch origin master
          git fetch origin build/native-swscale-dest-buffer-padding

      - name: Merge fork master into patched branch
        run: |
          git checkout build/native-swscale-dest-buffer-padding
          git merge --no-edit origin/master

      - name: Push updated branch
        run: |
          git push origin build/native-swscale-dest-buffer-padding
