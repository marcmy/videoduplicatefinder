name: Sync master from upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "11 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-master
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/0x90d/videoduplicatefinder.git || true
          git fetch origin
          git fetch upstream

      - name: Fast-forward master to upstream/master
        run: |
          git checkout master
          git merge --ff-only upstream/master

      - name: Push master
        run: |
          git push origin master
